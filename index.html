<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      font-family: 'Courier New', monospace;
      color: #fff;
    }
    h1 { font-size: 2rem; letter-spacing: 0.5rem; margin-bottom: 0.5rem; }
    #instructions {
      font-size: 0.75rem;
      color: #888;
      margin-bottom: 1rem;
      text-align: center;
    }
    canvas {
      border: 2px solid #fff;
      display: block;
    }
    #overlay {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
    }
    #overlay h2 { font-size: 2rem; margin-bottom: 0.5rem; }
    #overlay p  { font-size: 1rem; color: #aaa; }
  </style>
</head>
<body>
  <h1>PONG</h1>
  <div id="instructions">
    Left: W / S &nbsp;|&nbsp; Right: UP / DOWN &nbsp;|&nbsp; SPACE to pause
  </div>
  <div style="position:relative">
    <canvas id="canvas" width="800" height="500"></canvas>
    <div id="overlay">
      <h2>PONG</h2>
      <p>Press SPACE to start</p>
    </div>
  </div>

  <script>
    const canvas  = document.getElementById('canvas');
    const ctx     = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');

    const W = canvas.width;
    const H = canvas.height;

    const PADDLE_W = 12;
    const PADDLE_H = 80;
    const BALL_SIZE = 10;
    const PADDLE_SPEED = 5;
    const WIN_SCORE = 7;

    let state = 'idle'; // idle | playing | paused | won

    const ball = {
      x: W / 2, y: H / 2,
      vx: 0, vy: 0,
      speed: 5,
    };

    const paddles = {
      left:  { x: 20,          y: H / 2 - PADDLE_H / 2, score: 0, up: false, down: false },
      right: { x: W - 20 - PADDLE_W, y: H / 2 - PADDLE_H / 2, score: 0, up: false, down: false },
    };

    const keys = {};
    document.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'Space') {
        e.preventDefault();
        if (state === 'idle' || state === 'won') startGame();
        else if (state === 'playing') { state = 'paused'; showOverlay('PAUSED', 'Press SPACE to resume'); }
        else if (state === 'paused')  { state = 'playing'; hideOverlay(); }
      }
      if (['ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
    });
    document.addEventListener('keyup', e => { keys[e.code] = false; });

    function startGame() {
      paddles.left.score  = 0;
      paddles.right.score = 0;
      paddles.left.y  = H / 2 - PADDLE_H / 2;
      paddles.right.y = H / 2 - PADDLE_H / 2;
      launchBall();
      state = 'playing';
      hideOverlay();
    }

    function launchBall() {
      ball.x = W / 2;
      ball.y = H / 2;
      ball.speed = 5;
      const angle = (Math.random() * 60 - 30) * (Math.PI / 180);
      const dir   = Math.random() < 0.5 ? 1 : -1;
      ball.vx = dir * ball.speed * Math.cos(angle);
      ball.vy = ball.speed * Math.sin(angle);
    }

    function showOverlay(title, sub) {
      overlay.innerHTML = `<h2>${title}</h2><p>${sub}</p>`;
      overlay.style.display = 'flex';
    }
    function hideOverlay() { overlay.style.display = 'none'; }

    function updatePaddles() {
      if (keys['KeyW'])       paddles.left.y  -= PADDLE_SPEED;
      if (keys['KeyS'])       paddles.left.y  += PADDLE_SPEED;
      if (keys['ArrowUp'])    paddles.right.y -= PADDLE_SPEED;
      if (keys['ArrowDown'])  paddles.right.y += PADDLE_SPEED;

      for (const p of Object.values(paddles)) {
        p.y = Math.max(0, Math.min(H - PADDLE_H, p.y));
      }
    }

    function updateBall() {
      ball.x += ball.vx;
      ball.y += ball.vy;

      // Top / bottom wall
      if (ball.y <= 0) { ball.y = 0; ball.vy *= -1; }
      if (ball.y + BALL_SIZE >= H) { ball.y = H - BALL_SIZE; ball.vy *= -1; }

      // Left paddle collision
      const lp = paddles.left;
      if (
        ball.vx < 0 &&
        ball.x <= lp.x + PADDLE_W &&
        ball.x >= lp.x &&
        ball.y + BALL_SIZE >= lp.y &&
        ball.y <= lp.y + PADDLE_H
      ) {
        ball.x = lp.x + PADDLE_W;
        reflect(lp);
      }

      // Right paddle collision
      const rp = paddles.right;
      if (
        ball.vx > 0 &&
        ball.x + BALL_SIZE >= rp.x &&
        ball.x + BALL_SIZE <= rp.x + PADDLE_W &&
        ball.y + BALL_SIZE >= rp.y &&
        ball.y <= rp.y + PADDLE_H
      ) {
        ball.x = rp.x - BALL_SIZE;
        reflect(rp);
      }

      // Score
      if (ball.x < 0) {
        paddles.right.score++;
        checkWin('right');
        launchBall();
      }
      if (ball.x > W) {
        paddles.left.score++;
        checkWin('left');
        launchBall();
      }
    }

    function reflect(paddle) {
      const center   = paddle.y + PADDLE_H / 2;
      const hit      = (ball.y + BALL_SIZE / 2 - center) / (PADDLE_H / 2); // -1 to 1
      const maxAngle = 60 * (Math.PI / 180);
      const angle    = hit * maxAngle;
      ball.speed     = Math.min(ball.speed + 0.3, 14);
      const dir      = ball.vx > 0 ? -1 : 1;
      ball.vx = dir * ball.speed * Math.cos(angle);
      ball.vy = ball.speed * Math.sin(angle);
    }

    function checkWin(side) {
      const p = paddles[side];
      if (p.score >= WIN_SCORE) {
        state = 'won';
        const label = side === 'left' ? 'LEFT PLAYER' : 'RIGHT PLAYER';
        showOverlay(`${label} WINS!`, 'Press SPACE to play again');
      }
    }

    function draw() {
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, W, H);

      // Center dashes
      ctx.setLineDash([10, 15]);
      ctx.strokeStyle = '#444';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(W / 2, 0);
      ctx.lineTo(W / 2, H);
      ctx.stroke();
      ctx.setLineDash([]);

      // Scores
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 3rem Courier New';
      ctx.textAlign = 'right';
      ctx.fillText(paddles.left.score,  W / 2 - 30, 70);
      ctx.textAlign = 'left';
      ctx.fillText(paddles.right.score, W / 2 + 30, 70);

      // Paddles
      ctx.fillStyle = '#fff';
      ctx.fillRect(lp.x, lp.y, PADDLE_W, PADDLE_H);
      ctx.fillRect(rp.x, rp.y, PADDLE_W, PADDLE_H);

      // Ball
      ctx.fillRect(ball.x, ball.y, BALL_SIZE, BALL_SIZE);
    }

    const lp = paddles.left;
    const rp = paddles.right;

    function loop() {
      if (state === 'playing') {
        updatePaddles();
        updateBall();
      }
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
