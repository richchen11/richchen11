<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Games</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #1a1a2e;
      display: flex;
      flex-direction: column;
      height: 100dvh;
      font-family: 'Courier New', monospace;
      overflow: hidden;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      padding: 0.6rem 1rem;
      background: #16213e;
      border-bottom: 2px solid #0f3460;
      flex-shrink: 0;
    }

    .tab {
      background: transparent;
      border: 2px solid #444;
      color: #888;
      padding: 0.4rem 1.4rem;
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      cursor: pointer;
      text-transform: uppercase;
      transition: background 0.15s, color 0.15s, border-color 0.15s;
    }

    .tab:hover { border-color: #aaa; color: #ccc; }

    .tab.active {
      background: #e94560;
      border-color: #e94560;
      color: #fff;
    }

    .frame-wrap {
      flex: 1;
      position: relative;
      overflow: hidden;
    }

    iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: none;
      display: none;
    }

    iframe.active { display: block; }
  </style>
</head>
<body>
  <nav>
    <button class="tab active" data-game="pong">Pong</button>
    <button class="tab"        data-game="2048">2048</button>
    <button class="tab"        data-game="tetris">Tetris</button>
  </nav>
  <div class="frame-wrap">
    <iframe id="pong"   src="pong.html"   class="active"></iframe>
    <iframe id="2048"   src="2048.html"></iframe>
    <iframe id="tetris" src="tetris.html"></iframe>
  </div>

  <script>
    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        const game = tab.dataset.game;
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('iframe').forEach(f => f.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(game).classList.add('active');
      });
    });
  </script>
</body>
</html>
