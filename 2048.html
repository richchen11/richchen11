<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>2048</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #faf8ef;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      font-family: 'Clear Sans', 'Helvetica Neue', Arial, sans-serif;
      touch-action: none;
      padding: 1rem;
      gap: 0;
    }

    header {
      width: min(480px, 100%);
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      margin-bottom: 0.5rem;
    }

    h1 { font-size: clamp(2.5rem, 12vw, 4rem); font-weight: 900; color: #776e65; line-height: 1; }

    .scores { display: flex; gap: 0.5rem; }

    .score-box {
      background: #bbada0;
      border-radius: 4px;
      padding: 0.3rem 0.8rem;
      text-align: center;
      min-width: 64px;
    }
    .score-box .lbl { font-size: 0.58rem; color: #eee4da; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
    .score-box .val { font-size: 1.1rem; font-weight: 700; color: #fff; }

    .controls {
      width: min(480px, 100%);
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.6rem;
    }

    .subtitle { font-size: 0.78rem; color: #776e65; }

    #new-game {
      background: #8f7a66; color: #f9f6f2; border: none;
      border-radius: 4px; padding: 0.45rem 1rem;
      font-size: 0.78rem; font-weight: 700; cursor: pointer;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    #new-game:hover { background: #a08878; }

    #board {
      position: relative;
      background: #bbada0;
      border-radius: 8px;
      padding: 10px;
      width: min(480px, 100%);
      touch-action: none;
      user-select: none;
    }

    .bg-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    .bg-cell {
      background: rgba(238, 228, 218, 0.35);
      border-radius: 4px;
      aspect-ratio: 1;
    }

    #tile-layer {
      position: absolute;
      inset: 10px;
    }

    .tile {
      position: absolute;
      border-radius: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      line-height: 1;
    }

    .tile.is-new    { animation: tile-appear 0.12s ease both; }
    .tile.is-merged { animation: tile-pop    0.18s ease both; }

    @keyframes tile-appear {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }
    @keyframes tile-pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.22); }
      100% { transform: scale(1); }
    }

    #overlay {
      display: none;
      position: absolute;
      inset: 0;
      border-radius: 8px;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
    }
    #overlay.show      { display: flex; }
    #overlay.gameover  { background: rgba(238, 228, 218, 0.75); }
    #overlay.win       { background: rgba(237, 194, 46, 0.55); }

    #overlay h2 { font-size: clamp(1.5rem, 9vw, 2.8rem); font-weight: 900; color: #776e65; }

    .btn-row { display: flex; gap: 0.75rem; }

    .ov-btn {
      background: #8f7a66; color: #f9f6f2; border: none;
      border-radius: 4px; padding: 0.55rem 1.3rem;
      font-size: 0.85rem; font-weight: 700; cursor: pointer;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .ov-btn:hover  { background: #a08878; }
    .ov-btn.keep   { background: #edc22e; color: #f9f6f2; }
    .ov-btn.keep:hover { background: #f0ca3c; }
  </style>
</head>
<body>

  <header>
    <h1>2048</h1>
    <div class="scores">
      <div class="score-box"><div class="lbl">Score</div><div class="val" id="score">0</div></div>
      <div class="score-box"><div class="lbl">Best</div><div class="val"  id="best">0</div></div>
    </div>
  </header>

  <div class="controls">
    <span class="subtitle">Join the tiles, reach <strong>2048!</strong></span>
    <button id="new-game">New Game</button>
  </div>

  <div id="board">
    <div class="bg-grid" id="bg-grid"></div>
    <div id="tile-layer"></div>
    <div id="overlay">
      <h2 id="ov-title">Game Over!</h2>
      <div class="btn-row">
        <button class="ov-btn" id="ov-retry">Try Again</button>
        <button class="ov-btn keep" id="ov-keep" style="display:none">Keep Going</button>
      </div>
    </div>
  </div>

  <script>
    // ── Setup ─────────────────────────────────────────────────
    const bgGrid    = document.getElementById('bg-grid');
    const tileLayer = document.getElementById('tile-layer');
    const overlay   = document.getElementById('overlay');
    const scoreEl   = document.getElementById('score');
    const bestEl    = document.getElementById('best');
    const ovTitle   = document.getElementById('ov-title');
    const ovKeep    = document.getElementById('ov-keep');

    for (let i = 0; i < 16; i++) bgGrid.insertAdjacentHTML('beforeend', '<div class="bg-cell"></div>');

    const GAP = 10;
    const N   = 4;
    const TILE_COLORS = {
      2:    ['#eee4da','#776e65'], 4:    ['#ede0c8','#776e65'],
      8:    ['#f2b179','#f9f6f2'], 16:   ['#f59563','#f9f6f2'],
      32:   ['#f67c5f','#f9f6f2'], 64:   ['#f65e3b','#f9f6f2'],
      128:  ['#edcf72','#f9f6f2'], 256:  ['#edcc61','#f9f6f2'],
      512:  ['#edc850','#f9f6f2'], 1024: ['#edc53f','#f9f6f2'],
      2048: ['#edc22e','#f9f6f2'],
    };

    let best = +localStorage.getItem('2048-best') || 0;
    bestEl.textContent = best;

    // ── State ─────────────────────────────────────────────────
    let grid, score, gameOver, won, keepPlaying, lastAdded, lastMerged;

    function init() {
      grid        = Array(16).fill(0);
      score       = 0;
      gameOver    = false;
      won         = false;
      keepPlaying = false;
      lastAdded   = -1;
      lastMerged  = new Set();
      overlay.className = '';
      addRandom(); addRandom();
      render();
    }

    // ── Move logic ────────────────────────────────────────────

    function mergeLine(line) {
      const vals = line.filter(v => v !== 0);
      const merged = new Set();
      let pts = 0;
      for (let i = 0; i < vals.length - 1; i++) {
        if (vals[i] === vals[i + 1]) {
          vals[i] *= 2;
          pts += vals[i];
          merged.add(i);
          vals.splice(i + 1, 1);
        }
      }
      while (vals.length < N) vals.push(0);
      return { vals, pts, merged };
    }

    function move(dir) {
      if (gameOver || (won && !keepPlaying)) return;

      const oldGrid = [...grid];
      let totalPts = 0;
      lastMerged = new Set();

      if (dir === 'left' || dir === 'right') {
        for (let r = 0; r < N; r++) {
          let row = grid.slice(r * N, r * N + N);
          if (dir === 'right') row.reverse();
          const res = mergeLine(row);
          if (dir === 'right') res.vals.reverse();
          res.vals.forEach((v, c) => { grid[r * N + c] = v; });
          totalPts += res.pts;
          res.merged.forEach(c => {
            const realC = dir === 'right' ? (N - 1 - c) : c;
            lastMerged.add(r * N + realC);
          });
        }
      } else {
        for (let c = 0; c < N; c++) {
          let col = [grid[c], grid[N + c], grid[2*N + c], grid[3*N + c]];
          if (dir === 'down') col.reverse();
          const res = mergeLine(col);
          if (dir === 'down') res.vals.reverse();
          res.vals.forEach((v, r) => { grid[r * N + c] = v; });
          totalPts += res.pts;
          res.merged.forEach(r => {
            const realR = dir === 'down' ? (N - 1 - r) : r;
            lastMerged.add(realR * N + c);
          });
        }
      }

      const moved = grid.some((v, i) => v !== oldGrid[i]);
      if (!moved) return;

      score += totalPts;
      if (score > best) { best = score; localStorage.setItem('2048-best', best); }

      addRandom();
      render();
      checkEndState();
    }

    function addRandom() {
      const empty = grid.reduce((a, v, i) => v === 0 ? [...a, i] : a, []);
      if (!empty.length) return;
      const idx = empty[Math.floor(Math.random() * empty.length)];
      grid[idx] = Math.random() < 0.9 ? 2 : 4;
      lastAdded = idx;
    }

    function checkEndState() {
      if (!keepPlaying && grid.includes(2048)) {
        won = true;
        ovTitle.textContent = 'You Win! 🎉';
        ovKeep.style.display = 'inline-block';
        overlay.className = 'show win';
        return;
      }
      if (grid.includes(0)) return;
      for (let r = 0; r < N; r++) {
        for (let c = 0; c < N; c++) {
          const v = grid[r * N + c];
          if (c < N - 1 && grid[r * N + c + 1] === v) return;
          if (r < N - 1 && grid[(r+1) * N + c] === v) return;
        }
      }
      gameOver = true;
      ovTitle.textContent = 'Game Over!';
      ovKeep.style.display = 'none';
      overlay.className = 'show gameover';
    }

    // ── Render ────────────────────────────────────────────────

    function tileSize() { return (tileLayer.offsetWidth - (N - 1) * GAP) / N; }
    function tilePos(i) { return i * (tileSize() + GAP); }

    function fontSize(val, size) {
      if (val >= 1024) return Math.round(size * 0.33);
      if (val >= 128)  return Math.round(size * 0.40);
      return Math.round(size * 0.50);
    }

    function render() {
      scoreEl.textContent = score;
      bestEl.textContent  = best;

      tileLayer.innerHTML = '';
      const size = tileSize();

      grid.forEach((val, i) => {
        if (!val) return;
        const r = Math.floor(i / N);
        const c = i % N;
        const [bg, fg] = TILE_COLORS[val] || ['#3c3a32', '#f9f6f2'];

        const el = document.createElement('div');
        el.className = 'tile';
        el.textContent = val;
        el.style.cssText = `
          width:${size}px; height:${size}px;
          top:${tilePos(r)}px; left:${tilePos(c)}px;
          background:${bg}; color:${fg};
          font-size:${fontSize(val, size)}px;
        `;

        if (i === lastAdded) el.classList.add('is-new');
        else if (lastMerged.has(i)) el.classList.add('is-merged');

        tileLayer.appendChild(el);
      });
    }

    // ── Input ─────────────────────────────────────────────────

    const KEY_MAP = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down' };

    document.addEventListener('keydown', e => {
      if (KEY_MAP[e.key]) { e.preventDefault(); move(KEY_MAP[e.key]); }
    });

    let swipeStart = null;
    const board = document.getElementById('board');

    board.addEventListener('pointerdown', e => { swipeStart = { x: e.clientX, y: e.clientY }; });
    board.addEventListener('pointerup', e => {
      if (!swipeStart) return;
      const dx = e.clientX - swipeStart.x;
      const dy = e.clientY - swipeStart.y;
      swipeStart = null;
      if (Math.max(Math.abs(dx), Math.abs(dy)) < 12) return;
      if (Math.abs(dx) > Math.abs(dy)) move(dx > 0 ? 'right' : 'left');
      else move(dy > 0 ? 'down' : 'up');
    });

    document.getElementById('new-game').addEventListener('click', init);
    document.getElementById('ov-retry').addEventListener('click', init);
    document.getElementById('ov-keep').addEventListener('click', () => {
      keepPlaying = true;
      overlay.className = '';
    });

    window.addEventListener('resize', render);

    init();
  </script>
</body>
</html>
