<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Pong</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      font-family: 'Courier New', monospace;
      color: #fff;
      overflow: hidden;
      touch-action: none;
    }
    h1 {
      font-size: clamp(1rem, 4vw, 2rem);
      letter-spacing: 0.5rem;
      margin-bottom: 0.3rem;
    }
    #instructions {
      font-size: clamp(0.55rem, 2vw, 0.75rem);
      color: #888;
      margin-bottom: 0.5rem;
      text-align: center;
      padding: 0 0.5rem;
    }
    #touch-hint {
      font-size: clamp(0.55rem, 2vw, 0.7rem);
      color: #555;
      margin-bottom: 0.5rem;
      text-align: center;
    }
    #canvas-wrap {
      position: relative;
      width: min(800px, 98vw);
    }
    canvas {
      border: 2px solid #fff;
      display: block;
      width: 100%;
      height: auto;
      touch-action: none;
    }
    #overlay {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
      background: rgba(0,0,0,0.45);
    }
    #overlay h2 {
      font-size: clamp(1.2rem, 5vw, 2rem);
      margin-bottom: 0.5rem;
    }
    #overlay p {
      font-size: clamp(0.7rem, 3vw, 1rem);
      color: #aaa;
    }
    /* Touch zone indicators shown on overlay */
    #touch-zones {
      position: absolute;
      inset: 0;
      display: none;
      pointer-events: none;
    }
    #touch-zones .zone {
      position: absolute;
      top: 0; bottom: 0;
      width: 50%;
      border: 1px dashed #333;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.65rem;
      color: #333;
      letter-spacing: 0.05rem;
    }
    #touch-zones .zone.left  { left: 0; }
    #touch-zones .zone.right { right: 0; }
  </style>
</head>
<body>
  <h1>PONG</h1>
  <div id="instructions">
    <span id="kb-hint">Left: W/S &nbsp;|&nbsp; Right: ↑/↓ &nbsp;|&nbsp; SPACE to pause</span>
  </div>
  <div id="touch-hint" style="display:none">Drag left side / right side to move paddles</div>
  <div id="canvas-wrap">
    <canvas id="canvas" width="800" height="500"></canvas>
    <div id="touch-zones">
      <div class="zone left">LEFT</div>
      <div class="zone right">RIGHT</div>
    </div>
    <div id="overlay">
      <h2>PONG</h2>
      <p id="start-msg">Press SPACE or tap to start</p>
    </div>
  </div>

  <script>
    const canvas  = document.getElementById('canvas');
    const ctx     = canvas.getContext('2d');
    const overlay = document.getElementById('overlay');
    const touchZones = document.getElementById('touch-zones');

    const W = canvas.width;
    const H = canvas.height;

    const PADDLE_W     = 12;
    const PADDLE_H     = 80;
    const BALL_SIZE    = 10;
    const PADDLE_SPEED = 5;
    const WIN_SCORE    = 7;

    let state = 'idle';

    const ball = { x: W / 2, y: H / 2, vx: 0, vy: 0, speed: 5 };

    const paddles = {
      left:  { x: 20,               y: H / 2 - PADDLE_H / 2, score: 0 },
      right: { x: W - 20 - PADDLE_W, y: H / 2 - PADDLE_H / 2, score: 0 },
    };

    const lp = paddles.left;
    const rp = paddles.right;

    // ── Keyboard ──────────────────────────────────────────────
    const keys = {};
    document.addEventListener('keydown', e => {
      keys[e.code] = true;
      if (e.code === 'Space') {
        e.preventDefault();
        handleStart();
      }
      if (['ArrowUp','ArrowDown'].includes(e.code)) e.preventDefault();
    });
    document.addEventListener('keyup', e => { keys[e.code] = false; });

    // ── Touch ─────────────────────────────────────────────────
    const isTouchDevice = () => window.matchMedia('(pointer: coarse)').matches;

    // Map of pointerId → { side, startY, paddleStartY }
    const touches = {};

    function canvasY(clientY) {
      const rect  = canvas.getBoundingClientRect();
      const scale = H / rect.height;
      return (clientY - rect.top) * scale;
    }

    function canvasX(clientX) {
      const rect  = canvas.getBoundingClientRect();
      const scale = W / rect.width;
      return (clientX - rect.left) * scale;
    }

    canvas.addEventListener('pointerdown', e => {
      e.preventDefault();
      if (state === 'idle' || state === 'won') { handleStart(); return; }
      if (state === 'paused') { resumeGame(); return; }

      const cx   = canvasX(e.clientX);
      const cy   = canvasY(e.clientY);
      const side = cx < W / 2 ? 'left' : 'right';
      const paddle = paddles[side];
      touches[e.pointerId] = { side, startY: cy, paddleStartY: paddle.y };
    });

    canvas.addEventListener('pointermove', e => {
      e.preventDefault();
      const t = touches[e.pointerId];
      if (!t || state !== 'playing') return;
      const cy     = canvasY(e.clientY);
      const dy     = cy - t.startY;
      const paddle = paddles[t.side];
      paddle.y = Math.max(0, Math.min(H - PADDLE_H, t.paddleStartY + dy));
    });

    canvas.addEventListener('pointerup',     e => { delete touches[e.pointerId]; });
    canvas.addEventListener('pointercancel', e => { delete touches[e.pointerId]; });

    // Tap on overlay (start/resume)
    overlay.addEventListener('pointerdown', e => { e.stopPropagation(); handleStart(); });

    // ── Game logic ────────────────────────────────────────────
    function handleStart() {
      if (state === 'idle' || state === 'won') startGame();
      else if (state === 'playing') pauseGame();
      else if (state === 'paused')  resumeGame();
    }

    function startGame() {
      lp.score = rp.score = 0;
      lp.y = rp.y = H / 2 - PADDLE_H / 2;
      launchBall();
      state = 'playing';
      hideOverlay();
    }

    function pauseGame()  { state = 'paused'; showOverlay('PAUSED', 'Press SPACE or tap to resume'); }
    function resumeGame() { state = 'playing'; hideOverlay(); }

    window.addEventListener('message', e => {
      if (e.data === 'pause' && state === 'playing') pauseGame();
    });

    function launchBall() {
      ball.x = W / 2; ball.y = H / 2; ball.speed = 5;
      const angle = (Math.random() * 60 - 30) * (Math.PI / 180);
      const dir   = Math.random() < 0.5 ? 1 : -1;
      ball.vx = dir  * ball.speed * Math.cos(angle);
      ball.vy = ball.speed * Math.sin(angle);
    }

    function showOverlay(title, sub) {
      overlay.querySelector('h2').textContent = title;
      overlay.querySelector('p').textContent  = sub;
      overlay.style.display = 'flex';
    }
    function hideOverlay() { overlay.style.display = 'none'; }

    function updatePaddles() {
      if (keys['KeyW'])      lp.y -= PADDLE_SPEED;
      if (keys['KeyS'])      lp.y += PADDLE_SPEED;
      if (keys['ArrowUp'])   rp.y -= PADDLE_SPEED;
      if (keys['ArrowDown']) rp.y += PADDLE_SPEED;
      lp.y = Math.max(0, Math.min(H - PADDLE_H, lp.y));
      rp.y = Math.max(0, Math.min(H - PADDLE_H, rp.y));
    }

    function updateBall() {
      ball.x += ball.vx;
      ball.y += ball.vy;

      if (ball.y <= 0)            { ball.y = 0;            ball.vy *= -1; }
      if (ball.y + BALL_SIZE >= H){ ball.y = H - BALL_SIZE; ball.vy *= -1; }

      if (
        ball.vx < 0 &&
        ball.x <= lp.x + PADDLE_W && ball.x >= lp.x &&
        ball.y + BALL_SIZE >= lp.y && ball.y <= lp.y + PADDLE_H
      ) { ball.x = lp.x + PADDLE_W; reflect(lp); }

      if (
        ball.vx > 0 &&
        ball.x + BALL_SIZE >= rp.x && ball.x + BALL_SIZE <= rp.x + PADDLE_W &&
        ball.y + BALL_SIZE >= rp.y && ball.y <= rp.y + PADDLE_H
      ) { ball.x = rp.x - BALL_SIZE; reflect(rp); }

      if (ball.x < 0)  { rp.score++; checkWin('right'); launchBall(); }
      if (ball.x > W)  { lp.score++; checkWin('left');  launchBall(); }
    }

    function reflect(paddle) {
      const center   = paddle.y + PADDLE_H / 2;
      const hit      = (ball.y + BALL_SIZE / 2 - center) / (PADDLE_H / 2);
      const angle    = hit * 60 * (Math.PI / 180);
      ball.speed     = Math.min(ball.speed + 0.3, 14);
      const dir      = ball.vx > 0 ? -1 : 1;
      ball.vx = dir * ball.speed * Math.cos(angle);
      ball.vy = ball.speed * Math.sin(angle);
    }

    function checkWin(side) {
      if (paddles[side].score >= WIN_SCORE) {
        state = 'won';
        const label = side === 'left' ? 'LEFT PLAYER' : 'RIGHT PLAYER';
        showOverlay(`${label} WINS!`, 'Press SPACE or tap to play again');
      }
    }

    // ── Draw ──────────────────────────────────────────────────
    function draw() {
      ctx.fillStyle = '#111';
      ctx.fillRect(0, 0, W, H);

      // Touch zone dividers (subtle, always shown during play)
      if (state === 'playing' && isTouchDevice()) {
        ctx.setLineDash([6, 10]);
        ctx.strokeStyle = '#2a2a2a';
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H); ctx.stroke();
        ctx.setLineDash([]);
      } else {
        ctx.setLineDash([10, 15]);
        ctx.strokeStyle = '#444';
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(W / 2, 0); ctx.lineTo(W / 2, H); ctx.stroke();
        ctx.setLineDash([]);
      }

      ctx.fillStyle = '#fff';
      ctx.font = 'bold 3rem Courier New';
      ctx.textAlign = 'right';
      ctx.fillText(lp.score, W / 2 - 30, 70);
      ctx.textAlign = 'left';
      ctx.fillText(rp.score, W / 2 + 30, 70);

      ctx.fillStyle = '#fff';
      ctx.fillRect(lp.x, lp.y, PADDLE_W, PADDLE_H);
      ctx.fillRect(rp.x, rp.y, PADDLE_W, PADDLE_H);
      ctx.fillRect(ball.x, ball.y, BALL_SIZE, BALL_SIZE);
    }

    // ── Adaptive hints ────────────────────────────────────────
    if (isTouchDevice()) {
      document.getElementById('kb-hint').style.display  = 'none';
      document.getElementById('touch-hint').style.display = 'block';
    }

    // ── Loop ──────────────────────────────────────────────────
    function loop() {
      if (state === 'playing') { updatePaddles(); updateBall(); }
      draw();
      requestAnimationFrame(loop);
    }

    loop();
  </script>
</body>
</html>
