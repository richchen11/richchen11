<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam Co-op Shooters</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: 'Courier New', monospace;
      min-height: 100dvh;
      padding: 1.5rem 1rem 3rem;
    }

    header {
      max-width: min(1100px, 98vw);
      margin: 0 auto 1.5rem;
    }

    h1 {
      font-size: clamp(1.4rem, 5vw, 2.2rem);
      font-weight: 900;
      color: #e94560;
      letter-spacing: 0.15rem;
      margin-bottom: 0.3rem;
    }

    .subtitle { font-size: 0.82rem; color: #8b949e; }

    /* ── Filters ───────────────────────────────────────────── */
    .filters {
      max-width: min(1100px, 98vw);
      margin: 0 auto 1rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .filter-group label {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8b949e;
      white-space: nowrap;
    }

    .filter-group select {
      background: #161b22;
      color: #e6edf3;
      border: 1px solid #30363d;
      border-radius: 6px;
      padding: 0.3rem 0.6rem;
      font-family: inherit;
      font-size: 0.78rem;
      cursor: pointer;
      outline: none;
    }

    .filter-group select:focus { border-color: #e94560; }

    .count {
      margin-left: auto;
      font-size: 0.72rem;
      color: #8b949e;
      white-space: nowrap;
    }

    .count span { color: #e94560; font-weight: 700; }

    /* ── Table wrapper ─────────────────────────────────────── */
    .table-wrap {
      max-width: min(1100px, 98vw);
      margin: 0 auto;
      overflow-x: auto;
      border: 1px solid #30363d;
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 620px;
    }

    thead {
      background: #161b22;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    thead th {
      padding: 0.75rem 1rem;
      text-align: left;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #8b949e;
      border-bottom: 1px solid #30363d;
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid #21262d;
      transition: background 0.12s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:nth-child(even) { background: rgba(255,255,255,0.02); }
    tbody tr:hover { background: #161b22; }

    tbody td {
      padding: 0.85rem 1rem;
      font-size: 0.82rem;
      vertical-align: top;
    }

    .game-name { font-weight: 700; color: #e6edf3; white-space: nowrap; }

    .players { white-space: nowrap; color: #e6edf3; }
    .players-icon { color: #e94560; margin-right: 0.25rem; }
    .price { color: #8b949e; white-space: nowrap; }

    .pros-list, .cons-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .pros-list li::before { content: '+ '; color: #3fb950; font-weight: 700; }
    .cons-list li::before { content: '- '; color: #f85149; font-weight: 700; }

    .pros-list li, .cons-list li {
      font-size: 0.78rem;
      color: #c9d1d9;
      line-height: 1.5;
    }

    #empty-msg {
      display: none;
      padding: 3rem;
      text-align: center;
      color: #8b949e;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>

  <header>
    <h1>Steam Co-op Shooters</h1>
    <p class="subtitle">Pros &amp; cons of popular online co-op shooter games on Steam — filter by player count</p>
  </header>

  <div class="filters">
    <div class="filter-group">
      <label for="f-players">Players</label>
      <select id="f-players">
        <option value="all">Any count</option>
        <option value="2">2 players</option>
        <option value="4">Up to 4</option>
        <option value="6plus">6 or more</option>
      </select>
    </div>
    <div class="count">Showing <span id="count">10</span> of 10 games</div>
  </div>

  <div class="table-wrap">
    <table id="game-table">
      <thead>
        <tr>
          <th>Game</th>
          <th>Players</th>
          <th>Price</th>
          <th>Pros</th>
          <th>Cons</th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div id="empty-msg">No games match the selected filters.</div>
  </div>

  <script>
    const GAMES = [
      {
        name: 'Deep Rock Galactic',
        maxPlayers: 4,
        price: '~$30',
        pros: [
          'Every class feels vital to the team',
          'Procedurally generated caves keep runs fresh',
          'Excellent friendly-fire forgiveness',
          'Strong ongoing developer support',
        ],
        cons: [
          'Late-game grind can feel repetitive',
          'Limited narrative depth',
          'No cross-play with console versions',
        ],
      },
      {
        name: 'Left 4 Dead 2',
        maxPlayers: 4,
        price: '~$10',
        pros: [
          'Classic campaigns still hold up',
          'Massive modding community with new content',
          'Tight teamplay mechanics under pressure',
          'Still has an active player base',
        ],
        cons: [
          'Aging engine and visuals (Source, 2009)',
          'Matchmaking can be slow outside peak hours',
          'No official new content in many years',
        ],
      },
      {
        name: 'Borderlands 2',
        maxPlayers: 4,
        price: '~$20',
        pros: [
          'Billions of procedurally generated guns',
          'Witty writing and memorable characters',
          'Scales well for 2–4 players',
          'Enormous amount of DLC content',
        ],
        cons: [
          'Older art style and UI',
          'Difficulty spikes sharply without full squad',
          'Some DLC is near-essential but costs extra',
        ],
      },
      {
        name: 'Borderlands 3',
        maxPlayers: 4,
        price: '~$30',
        pros: [
          'Improved gunplay and movement over Borderlands 2',
          'Huge variety of playable vault hunters',
          'Tons of endgame content and raids',
          'Seamless drop-in/drop-out co-op',
        ],
        cons: [
          'Story and humor divisive compared to BL2',
          'Balance issues in endgame difficulty scaling',
          'Cross-play limited to some platforms',
        ],
      },
      {
        name: 'Killing Floor 2',
        maxPlayers: 6,
        price: '~$30',
        pros: [
          'Gruesome, satisfying gunplay',
          'Up to 6 players with distinct perk classes',
          'Large roster of maps and Zed enemies',
          'Long-term free content updates',
        ],
        cons: [
          'Repetitive wave format after many hours',
          'High difficulty on later waves for casual groups',
          'Microtransaction cosmetics feel intrusive',
        ],
      },
      {
        name: 'Payday 2',
        maxPlayers: 4,
        price: '~$10',
        pros: [
          'Huge variety of heists and game modes',
          'Deep skill tree and build customization',
          'Active community and massive mod support',
          'Very cheap — frequent sales',
        ],
        cons: [
          'Overwhelming DLC catalogue (100+ packs)',
          'Steep learning curve for new players',
          'Older graphics and some dated mechanics',
        ],
      },
      {
        name: 'Risk of Rain 2',
        maxPlayers: 4,
        price: '~$25',
        pros: [
          'Excellent roguelite loop with item synergies',
          'Up to 4 players with diverse character kits',
          'Each run feels meaningfully different',
          'Satisfying difficulty escalation',
        ],
        cons: [
          'Late-run chaos can make screens unreadable',
          'Some DLC characters feel unbalanced',
          'Limited base content without expansions',
        ],
      },
      {
        name: 'Back 4 Blood',
        maxPlayers: 4,
        price: '~$40',
        pros: [
          'Modern spiritual successor to Left 4 Dead',
          'Card deck system adds strategic depth',
          'Polished gunplay and graphics',
          'Active developer support post-launch',
        ],
        cons: [
          'Mixed PvP mode compared to campaign',
          'Higher price point than older co-op shooters',
          'Card system can feel overwhelming early on',
        ],
      },
      {
        name: 'Helldivers 2',
        maxPlayers: 4,
        price: '~$40',
        pros: [
          'Intense friendly-fire adds real tension',
          'Galactic war gives community a shared goal',
          'Excellent stratagem variety and customization',
          'Consistently fun moment-to-moment action',
        ],
        cons: [
          'Server issues at launch affected early players',
          'Steep difficulty on higher missions for new players',
          'Controversial PSN requirement on some platforms',
        ],
      },
      {
        name: 'Warframe',
        maxPlayers: 4,
        price: 'Free',
        pros: [
          'Free to play with no pay-to-win mechanics',
          'Enormous content library after years of updates',
          'Fluid movement and combat system',
          'Generous drop rates for in-game currency',
        ],
        cons: [
          'Overwhelming new player experience',
          'Heavy grind to unlock certain Warframes',
          'Older content feels dated compared to new missions',
        ],
      },
    ];

    const TOTAL   = GAMES.length;
    const tbody   = document.getElementById('tbody');
    const countEl = document.getElementById('count');
    const emptyMsg = document.getElementById('empty-msg');
    const fPlayers = document.getElementById('f-players');

    countEl.textContent = TOTAL;
    document.querySelector('.count').innerHTML =
      `Showing <span id="count">${TOTAL}</span> of ${TOTAL} games`;

    function matchesPlayerFilter(maxPlayers, filter) {
      if (filter === 'all')   return true;
      if (filter === '2')     return maxPlayers <= 2;
      if (filter === '4')     return maxPlayers <= 4;
      if (filter === '6plus') return maxPlayers >= 6;
      return true;
    }

    function buildRow(g) {
      const tr = document.createElement('tr');
      tr.dataset.players = g.maxPlayers;
      const pros = g.pros.map(p => `<li>${p}</li>`).join('');
      const cons = g.cons.map(c => `<li>${c}</li>`).join('');
      tr.innerHTML = `
        <td class="game-name">${g.name}</td>
        <td class="players"><span class="players-icon">♟</span>${g.maxPlayers === 1 ? '1' : g.maxPlayers}</td>
        <td class="price">${g.price}</td>
        <td><ul class="pros-list">${pros}</ul></td>
        <td><ul class="cons-list">${cons}</ul></td>
      `;
      return tr;
    }

    function applyFilters() {
      const players = fPlayers.value;
      let visible = 0;
      tbody.querySelectorAll('tr').forEach(tr => {
        const show = matchesPlayerFilter(+tr.dataset.players, players);
        tr.style.display = show ? '' : 'none';
        if (show) visible++;
      });
      document.getElementById('count').textContent = visible;
      emptyMsg.style.display = visible === 0 ? 'block' : 'none';
    }

    GAMES.forEach(g => tbody.appendChild(buildRow(g)));
    fPlayers.addEventListener('change', applyFilters);
  </script>
</body>
</html>
